storage:
  # Directories that are version-controlled — human-curated, edited by hand.
  db_tracked:
    - people/
    - companies/
    - deals/
    - concepts/
    - yc/
    - ideas/
    - projects/

  # Directories persisted via the brain database only — bulk machine-generated
  # content. .gitignored automatically by `gbrain sync`. Restorable from the DB
  # via `gbrain export --restore-only`.
  db_only:
    - media/x/
    - media/articles/
    - meetings/transcripts/

# Recency decay overrides (gbrain decision-governance, 2026-06-22).
# Per-prefix age-decay for the RECENCY ranking axis (src/core/search/recency-decay.ts).
# decisions/ decays fast so "what's the LATEST decision on X" surfaces the newest.
# CAVEAT: this only fires when the recency axis is ON. Canonical-truth lookups
# auto-detect recency='off' (query-intent.ts: "canonical truth -> off"), so this
# does NOT cover the stale-decision-as-truth class — that's handled by the
# recency-INDEPENDENT content_flag sweep. This is the temporal-query complement.
recency:
  decisions/:
    halflifeDays: 45
    coefficient: 1.0
